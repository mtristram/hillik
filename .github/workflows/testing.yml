name: Unit test

on: [push]

env:
  COBAYA_PACKAGES_PATH: $GITHUB_WORKSPACE/modules

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: [3.8, 3.9]

    steps:
    - uses: actions/checkout@v2

    - name: Setup upterm session
      uses: xgarrido/action-upterm@v1

    - name: Untar foreground templates
      run: |
        echo $GITHUB_WORKSPACE
        echo $COBAYA_PACKAGES_PATH
        mkdir -p $COBAYA_PACKAGES_PATH
        tar zxv data/foregrounds.tar.gz --directory=$COBAYA_PACKAGES_PATH

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Brew packages
      if: matrix.os == 'macos-latest'
      run: |
        set -x
        sudo ln -s /usr/local/bin/gfortran-10 /usr/local/bin/gfortran
        gfortran --version

    - name: Install dependencies via pip
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Unit tests
      run: |
        pip install camb
        python -m unittest hillik_planck.tests.test_planck
        python -m unittest hillik_spt.tests.test_spt
        python -m unittest hillik_act.tests.test_act
