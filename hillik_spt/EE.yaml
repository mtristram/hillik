path: null

# Bandpower file
bandpower_filename: SPT3G_D1_TnE_bdp.txt

# Covariance file
covariance_filename: SPT3G_D1_TnE_cov.dat

# Beam eigemodes
beam_eigenmodes_filename: beams_templates/cov_eigenmodes_300_4100.npz

# Main Beam
beam_main_filename: beams_templates/B_ell_300_4100_main_rc4.npz

# Windows directory
window_folder: windows

foregrounds: !defaults [foregrounds]

# Spectra to use (order does not matter)
spectra_to_fit:
  - EE 90x90
  - EE 90x150
  - EE 90x220
  - EE 150x150
  - EE 150x220
  - EE 220x220


#Parameters
params:
  SPT3G_cal:
    prior:
      min: 0.7
      max: 1.3
    ref: 1.00
    proposal: 0.01
    latex: c^{SPT3G}

  #super sample lensing
  SPT3G_kappa:
    prior:
      dist: norm
      loc: 0.0
      scale: 0.00045
    ref: 0.0
    proposal: 0.00045
    latex: \kappa

  #Calib T
  SPT3G_cal_90: 1.0
  SPT3G_cal_150: 1.0
  SPT3G_cal_220: 1.0

  #polar efficiency
  SPT3G_pe_90:
    prior:
      min: 0.8
      max: 1.2
    ref: 1.00
    proposal: 0.001
    latex: \rho^\mathrm{SPT3G}_{90}
  SPT3G_pe_150:
    prior:
      min: 0.8
      max: 1.2
    ref: 1.00
    proposal: 0.005
    latex: \rho^\mathrm{SPT3G}_{150}
  SPT3G_pe_220:
    prior:
      min: 0.8
      max: 1.2
    ref: 1.00
    proposal: 0.003
    latex: \rho^\mathrm{SPT3G}_{220}

  #extragal
  xi:
    value: 0.1
    latex: \xi_\mathrm{SZxCIB}
  Atsz:
    value: 3.0
    latex: A_\mathrm{tSZ}
  Acib:
    value: 4.0
    latex: A_\mathrm{CIB}
  Aksz:
    value: 0.1
    latex: A_\mathrm{kSZ}
  beta_cib:
    value: 1.75
    latex: \beta_\mathrm{CIB}
  alpha_cib:
    value: 1.2
    latex: \alpha_\mathrm{CIB}
  T_cib:
    value: 25.
    latex: T_\mathrm{CIB}
  beta_radio:
    value: -0.8
    latex: \beta_\mathrm{radio}^\mathrm{PS}
  beta_dusty:
    value: "lambda beta_cib: beta_cib"
    latex: \beta_\mathrm{IR}^\mathrm{PS}

  #Dust
  SPT3G_AdustTT:
    value: 1.88
    latex: A_\mathrm{dustTT}^{SPT3G}
  SPT3G_beta_dustTT:
    value: 1.48
    latex: \beta_\mathrm{dustTT}^{SPT3G}
  SPT3G_alpha_dustTT:
    value: -2.53
    latex: \alpha_\mathrm{dustTT}^{SPT3G}
  SPT3G_AdustTE:
    value: 0.12
    latex: A_\mathrm{dustTE}^{SPT3G}
  SPT3G_beta_dustTE:
    value: 1.51
    latex: \beta_\mathrm{dustTE}^{SPT3G}
  SPT3G_alpha_dustTE:
    value: -2.42
    latex: \alpha_\mathrm{dustTE}^{SPT3G}
  SPT3G_AdustEE:
    prior:
      dist: norm
      loc: 0.05
      scale: 0.022
    ref: 0.057
    proposal: 0.01
    latex: A_\mathrm{dustEE}^{SPT3G}
  SPT3G_beta_dustEE:
    value: 1.51
    latex: \beta_\mathrm{dustEE}^{SPT3G}
  SPT3G_alpha_dustEE:
    value: -2.42
    latex: \alpha_\mathrm{dustEE}^{SPT3G}

  #PS
  SPT3G_radio_TE:
    value: 0.
    latex: A_\mathrm{radioTE}^\mathrm{SPT3G}
  SPT3G_radio_EE:
    value: 0.
    latex: A_\mathrm{radioEE}^\mathrm{SPT3G}

  #Poisson
  SPT3G_radio_TT:
    value: 2.
    latex: A_\mathrm{radioTT}^\mathrm{SPT3G}
  SPT3G_cib_ps:
    value: 7.
    latex: A_\mathrm{IR}^\mathrm{SPT3G}

  #Beam eigenmodes
  SPT3G_beta_1: 0.
  SPT3G_beta_2: 0.
  SPT3G_beta_3: 0.
  SPT3G_beta_4: 0.
  SPT3G_beta_5: 0.
  SPT3G_beta_6: 0.
  SPT3G_beta_7: 0.
  SPT3G_beta_8: 0.
  SPT3G_beta_9: 0.

  #T-to-P leakage
  SPT3G_T2P2_90:
    prior:
      dist: norm
      loc: -0.0065
      scale: 0.0011
    ref: 0.0
    proposal: 0.0005
    latex: \epsilon_{90}^{SPT3G}
  SPT3G_T2P2_150:
    prior:
      dist: norm
      loc: -0.012
      scale: 0.0021
    ref: 0.0
    proposal: 0.001
    latex: \epsilon_{150}^{SPT3G}
  SPT3G_T2P2_220:
    prior:
      dist: norm
      loc: -0.023
      scale: 0.0066
    ref: 0.0
    proposal: 0.003
    latex: \epsilon_{220}^{SPT3G}

  #Beam sidelobe polarization
  SPT3G_beta_pol_90:
    prior:
      min: 0.0
      max: 1.0
    ref: 1.00
    proposal: 0.1
    latex: \gamma_{90}^{SPT3G}
  SPT3G_beta_pol_150:
    prior:
      min: 0.0
      max: 1.0
    ref: 1.00
    proposal: 0.1
    latex: \gamma_{150}^{SPT3G}
  SPT3G_beta_pol_220:
    prior:
      min: 0.0
      max: 1.0
    ref: 1.00
    proposal: 0.1
    latex: \gamma_{220}^{SPT3G}

