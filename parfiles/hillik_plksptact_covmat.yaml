      min: 0.017
      max: 0.027
    ref: 0.02237
    proposal: 6.5e-5
    latex: \Omega_\mathrm{b}h^2
  omch2:
    prior:
      min: 0.09
      max: 0.15
    ref: 0.1200
    proposal: 0.0011
    latex: \Omega_\mathrm{c}h^2
  tau:
    prior:
      min: 0.01
      max: 0.15
    ref: 0.055
    proposal: 0.007
    latex: \tau_\mathrm{reio}


prior:
  reio: 'lambda tau: stats.norm.logpdf(tau, loc=0.055, scale=0.007)'

theory:
