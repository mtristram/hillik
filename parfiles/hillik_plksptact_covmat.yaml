    value: "lambda logA: 1e-10*np.exp(logA)"
    latex: A_\mathrm{s}
  ns:
    prior:
      min: 0.9
      max: 1.1
    ref: 0.9649
    proposal: 0.0033
    latex: n_\mathrm{s}
  ombh2:
