params:
  # Cosmo
  cosmomc_theta:
    prior:
      min: 0.0103
      max: 0.0105
    ref: 0.0104
    proposal: 1.5e-6
    latex: \theta_\mathrm{MC}
  logA:
    prior:
      min: 2.6
      max: 3.5
    proposal: 0.0036
    ref: 3.044
