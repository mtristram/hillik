debug: false

likelihood:
  planck_2018_lowl.TT: null
  planck_2020_lollipop.lowlE: null
  hillik_planck.TTTEEE: null


params:
  # Cosmo
  cosmomc_theta:
    prior:
      min: 0.0103
      max: 0.0105
    ref: 0.0104
    proposal: 1.5e-6
    latex: \theta_\mathrm{MC}
  logA:
    prior:
      min: 2.6
      max: 3.5
    proposal: 0.0036
    ref: 3.044
    drop: True
    latex: \log(10^{10} A_\mathrm{s})
  As:
    value: "lambda logA: 1e-10*np.exp(logA)"
    latex: A_\mathrm{s}
  ns:
    prior:
      min: 0.9
      max: 1.1
    ref: 0.9649
    proposal: 0.0033
    latex: n_\mathrm{s}
  ombh2:
    prior:
      min: 0.017
      max: 0.027
    ref: 0.02237
    proposal: 6.5e-5
    latex: \Omega_\mathrm{b}h^2
  omch2:
    prior:
      min: 0.09
      max: 0.15
    ref: 0.1200
    proposal: 0.0011
    latex: \Omega_\mathrm{c}h^2
  tau:
    prior:
      min: 0.01
      max: 0.15
    ref: 0.055
    proposal: 0.007
    latex: \tau_\mathrm{reio}
  mnu:
    prior:
      min: 0.
      max: 2.
    proposal: 0.03

  #derived
  H0:

  sigma8:


prior:
  cib: 'lambda beta_cib: stats.norm.logpdf(beta_cib, loc=1.75, scale=0.06)'

theory:
  camb:
    stop_at_error: False
    extra_args:
      lens_potential_accuracy: 1
      num_massive_neutrinos: 1
      nnu: 3.046

sampler:
  mcmc:
    covmat: /sps/planck/Users/tristram/Soft/Hillik/chains/hillik_plkTTTEEE.covmat

output: chains/mcmc

force: true
