debug: false

likelihood:
  planck_2018_lowl.TT: null
  planck_2020_lollipop.lowlE: null
  hillik_planck.TTTEEE: null
  hillik_spt.TTTEEE: null
  hillik_act.TTTEEE_PACT: null

params:
  # Cosmo
  H0:
    prior:
      min: 60
      max: 80
    proposal: 1.
    ref: 67.4
  logA:
    prior:
      min: 2.6
      max: 3.5
    proposal: 0.05
  As:
    value: "lambda logA: 1e-10*np.exp(logA)"
    latex: A_\mathrm{s}
  ns:
    prior:
      min: 0.9
      max: 1.1
    proposal: 0.016
  omegabh2:
    prior:
      min: 0.017
      max: 0.027
    proposal: 0.0003
  omegach2:
    prior:
      min: 0.09
      max: 0.15
    proposal: 0.004
  tau:
    prior:
      min: 0.01
      max: 0.15
    proposal: 0.03

  #derived
  theta_s_100:
  sigma8:

  #Dust beta
  beta_dustTT:
    prior:
      min: 1.40
      max: 1.60
    ref: 1.51
    proposal: 0.1
  PLK_beta_dustTT:
    value: 'lambda beta_dustTT: beta_dustTT'
  ACT_beta_dustTT:
    value: 'lambda beta_dustTT: beta_dustTT'
  SPT3G_beta_dustTT:
    value: 'lambda beta_dustTT: beta_dustTT'

  beta_dustTE:
    prior:
      min: 1.40
      max: 1.60
    ref: 1.59
    proposal: 0.1
  PLK_beta_dustTE:
    value: 'lambda beta_dustTE: beta_dustTE'
  ACT_beta_dustTE:
    value: 'lambda beta_dustTE: beta_dustTE'
  SPT3G_beta_dustTE:
    value: 'lambda beta_dustTE: beta_dustTE'

  beta_dustEE:
    prior:
      min: 1.40
      max: 1.60
    ref: 1.59
    proposal: 0.1
  PLK_beta_dustEE:
    value: 'lambda beta_dustEE: beta_dustEE'
  ACT_beta_dustEE:
    value: 'lambda beta_dustEE: beta_dustEE'
  SPT3G_beta_dustEE:
    value: 'lambda beta_dustEE: beta_dustEE'


theory:
  cosmopower:
    stop_at_error: False
    path_to_trained_models: data/cosmopower/lcdm
    TT_emulator: TTTEEE/TT_v1
    TE_emulator: TTTEEE/TE_v1
    EE_emulator: TTTEEE/EE_v1
    DER_emulator: derived-parameters/DER_v1

sampler:
  mcmc:
    learn_proposal_Rminus1_max_early: 500.
