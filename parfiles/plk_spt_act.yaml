debug: false

likelihood:
  planck_2018_lowl.TT: null
  planck_2020_hillipop.TT: null
  spt_hiell_2020.TT: null
  actpol_full_dr4.deep:
    use_te: False
    use_ee: False
  actpol_full_dr4.wide:
    use_te: False
    use_ee: False

params:
  # Cosmo
  cosmomc_theta:
    prior:
      min: 0.0103
      max: 0.0105
    proposal: 1.5e-6
    latex: \theta_\mathrm{MC}
  logA:
    prior:
      min: 2.6
      max: 3.5
    proposal: 0.0036
    drop: True
    latex: \log(10^{10} A_\mathrm{s})
  As:
    value: "lambda logA: 1e-10*np.exp(logA)"
    latex: A_\mathrm{s}
  ns:
    prior:
      min: 0.9
      max: 1.0
    proposal: 0.0033
    latex: n_\mathrm{s}
  ombh2:
    prior:
      min: 0.017
      max: 0.027
    proposal: 6.5e-5
    latex: \Omega_\mathrm{b}h^2
  omch2:
    prior:
      min: 0.09
      max: 0.15
    proposal: 0.0011
    latex: \Omega_\mathrm{c}h^2
  tau:
    prior:
      min: 0.01
      max: 0.15
    proposal: 0.007
    latex: \tau_\mathrm{reio}


prior:
  reio: 'lambda tau: stats.norm.logpdf(tau, loc=0.055, scale=0.007)'


theory:
  camb:
    stop_at_error: True
    extra_args:
      lens_potential_accuracy: 1

sampler:
  mcmc:

output: chains/mcmc

force: true
