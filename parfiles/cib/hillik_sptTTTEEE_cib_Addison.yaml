debug: false

likelihood:
  hillik_spt.TTTEEE:
    foregrounds: !defaults [/sps/planck/Users/tristram/Soft/Hillik/parfiles/cib/foregrounds_cib_Addison]

params:
  # Cosmo
  H0:
    prior:
      min: 60
      max: 80
    proposal: 1.
    ref: 67.4
  logA:
    prior:
      min: 2.6
      max: 3.5
    proposal: 0.05
  As:
    value: "lambda logA: 1e-10*np.exp(logA)"
    latex: A_\mathrm{s}
  ns:
    prior:
      min: 0.9
      max: 1.1
    proposal: 0.016
  omegabh2:
    prior:
      min: 0.017
      max: 0.027
    proposal: 0.0003
    latex: \Omega_\mathrm{b}h^2
  omegach2:
    prior:
      min: 0.09
      max: 0.15
    proposal: 0.004
  tau:
    prior:
      min: 0.01
      max: 0.15
    proposal: 0.03

  #derived
  theta_s_100:
  sigma8:

  #calibration
  SPT3G_cal:
    prior:
      dist: norm
      loc: 1.00
      scale: 0.0036
    ref: 1.00
    proposal: 0.01

  #CIB prior
  beta_cib:
    prior:
      dist: norm
      loc: 1.75
      scale: 0.06
    ref: 1.75
    proposal: 0.05
  beta_radio:
    prior:
      dist: norm
      loc: -0.8
      scale: 0.1
    ref: -0.8
    proposal: 0.05

theory:
  cosmopower:
    stop_at_error: False
    path_to_trained_models: data/cosmopower/lcdm
    TT_emulator: TTTEEE/TT_v1
    TE_emulator: TTTEEE/TE_v1
    EE_emulator: TTTEEE/EE_v1
    DER_emulator: derived-parameters/DER_v1

sampler:
  mcmc:
    covmat: /sps/planck/Users/tristram/Soft/Hillik/covmat/hillik_spt_TTTEEE.covmat
